<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1a33;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#11294a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37" />
      <stop offset="100%" style="stop-color:#f0d060" />
    </linearGradient>
    <linearGradient id="goldDim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f0d060;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2744" />
      <stop offset="100%" style="stop-color:#0f1a2e" />
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37" />
      <stop offset="100%" style="stop-color:#f0d060" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6" />
      <stop offset="100%" style="stop-color:#60a5fa" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" fill="url(#bg)" />

  <!-- Decorative blobs -->
  <ellipse cx="720" cy="80" rx="120" ry="100" fill="rgba(212,175,55,0.04)" />
  <ellipse cx="140" cy="380" rx="100" ry="70" fill="rgba(59,130,246,0.04)" />
  <ellipse cx="430" cy="220" rx="300" ry="180" fill="rgba(212,175,55,0.02)" />

  <!-- Floating dollar signs (background) -->
  <text x="95" y="105" font-family="Arial, sans-serif" font-size="28" fill="rgba(212,175,55,0.12)" font-weight="bold">$</text>
  <text x="760" y="380" font-family="Arial, sans-serif" font-size="36" fill="rgba(212,175,55,0.10)" font-weight="bold">$</text>
  <text x="680" y="70" font-family="Arial, sans-serif" font-size="20" fill="rgba(212,175,55,0.08)" font-weight="bold">$</text>

  <!-- ===== LAPTOP ===== -->
  <g filter="url(#shadow)">
    <!-- Screen bezel -->
    <rect x="245" y="85" width="370" height="248" rx="10" fill="#1e2a3e" />
    <!-- Screen -->
    <rect x="255" y="93" width="350" height="225" rx="4" fill="url(#screenGrad)" />

    <!-- Mini website wireframe on screen -->
    <!-- Header bar -->
    <rect x="265" y="103" width="330" height="30" rx="3" fill="rgba(255,255,255,0.06)" />
    <circle cx="278" cy="118" r="6" fill="rgba(255,255,255,0.1)" />
    <rect x="292" y="112" width="60" height="12" rx="2" fill="rgba(255,255,255,0.08)" />
    <rect x="362" y="112" width="40" height="12" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="412" y="112" width="40" height="12" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="462" y="112" width="40" height="12" rx="2" fill="rgba(255,255,255,0.06)" />

    <!-- Hero section on screen -->
    <rect x="265" y="143" width="330" height="55" rx="4" fill="rgba(212,175,55,0.08)" />
    <rect x="280" y="153" width="140" height="8" rx="2" fill="rgba(212,175,55,0.4)" />
    <rect x="280" y="167" width="200" height="6" rx="2" fill="rgba(255,255,255,0.2)" />
    <rect x="280" y="179" width="60" height="10" rx="3" fill="url(#gold)" opacity="0.6"/>

    <!-- Pricing cards row -->
    <rect x="265" y="208" width="100" height="55" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="275" y="216" width="40" height="6" rx="2" fill="rgba(212,175,55,0.3)" />
    <rect x="275" y="228" width="60" height="8" rx="2" fill="rgba(255,255,255,0.15)" />
    <rect x="275" y="242" width="70" height="6" rx="2" fill="rgba(255,255,255,0.08)" />

    <rect x="380" y="208" width="100" height="55" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="390" y="216" width="40" height="6" rx="2" fill="rgba(212,175,55,0.3)" />
    <rect x="390" y="228" width="60" height="8" rx="2" fill="rgba(255,255,255,0.15)" />
    <rect x="390" y="242" width="70" height="6" rx="2" fill="rgba(255,255,255,0.08)" />

    <rect x="495" y="208" width="100" height="55" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="505" y="216" width="40" height="6" rx="2" fill="rgba(212,175,55,0.3)" />
    <rect x="505" y="228" width="60" height="8" rx="2" fill="rgba(255,255,255,0.15)" />
    <rect x="505" y="242" width="70" height="6" rx="2" fill="rgba(255,255,255,0.08)" />

    <!-- Glow reflection on screen -->
    <rect x="255" y="93" width="350" height="225" rx="4" fill="url(#goldDim)" opacity="0.15" />
  </g>

  <!-- Keyboard base -->
  <g filter="url(#shadow)">
    <path d="M230 338 L260 370 L600 370 L630 338 Z" fill="#1e2a3e" />
    <path d="M240 342 L265 366 L595 366 L620 342 Z" fill="#2a3a52" />
    <!-- Keyboard keys hint -->
    <rect x="285" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="302" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="319" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="336" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="353" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="480" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="497" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="514" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="531" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="548" y="350" width="12" height="4" rx="1" fill="rgba(255,255,255,0.06)" />
    <rect x="400" y="350" width="60" height="4" rx="1" fill="rgba(255,255,255,0.08)" />
  </g>

  <!-- ===== FLOATING PRICE TAGS ===== -->

  <!-- Price tag 1 - Left: Freelancer -->
  <g filter="url(#shadow)">
    <rect x="70" y="120" width="130" height="50" rx="8" fill="#0d1b3e" stroke="rgba(212,175,55,0.3)" stroke-width="1.5" />
    <rect x="70" y="120" width="130" height="50" rx="8" fill="url(#goldDim)" opacity="0.1" />
    <circle cx="88" cy="145" r="10" fill="rgba(212,175,55,0.15)" />
    <text x="88" y="149" font-family="Arial, sans-serif" font-size="13" fill="#D4AF37" text-anchor="middle" font-weight="bold">$</text>
    <text x="108" y="139" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Freelancer</text>
    <text x="108" y="155" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">$500–$3,000</text>
  </g>

  <!-- Price tag 2 - Right: Agency -->
  <g filter="url(#shadow)">
    <rect x="640" y="160" width="150" height="50" rx="8" fill="#0d1b3e" stroke="rgba(59,130,246,0.3)" stroke-width="1.5" />
    <rect x="640" y="160" width="150" height="50" rx="8" fill="rgba(59,130,246,0.05)" />
    <circle cx="658" cy="185" r="10" fill="rgba(59,130,246,0.15)" />
    <text x="658" y="189" font-family="Arial, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="bold">$</text>
    <text x="678" y="179" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Agency</text>
    <text x="678" y="195" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">$5,000–$30,000</text>
  </g>

  <!-- Price tag 3 - Left bottom: DIY -->
  <g filter="url(#shadow)">
    <rect x="60" y="280" width="120" height="45" rx="8" fill="#0d1b3e" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" />
    <rect x="60" y="280" width="120" height="45" rx="8" fill="rgba(16,185,129,0.05)" />
    <circle cx="76" cy="302" r="9" fill="rgba(16,185,129,0.15)" />
    <text x="76" y="306" font-family="Arial, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="bold">$</text>
    <text x="94" y="296" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">DIY</text>
    <text x="94" y="311" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="bold">$50–$300/yr</text>
  </g>

  <!-- ===== BAR CHART (bottom right) ===== -->
  <g filter="url(#shadow)">
    <rect x="635" y="280" width="175" height="110" rx="8" fill="rgba(13,27,62,0.8)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />

    <!-- Y-axis -->
    <line x1="660" y1="370" x2="660" y2="300" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <!-- X-axis -->
    <line x1="660" y1="370" x2="785" y2="370" stroke="rgba(255,255,255,0.15)" stroke-width="1" />

    <!-- Bars -->
    <rect x="668" y="348" width="22" height="22" rx="3" fill="url(#bar3)" />
    <rect x="704" y="330" width="22" height="40" rx="3" fill="url(#bar1)" />
    <rect x="740" y="300" width="22" height="70" rx="3" fill="url(#bar2)" />

    <!-- Labels -->
    <text x="679" y="383" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">DIY</text>
    <text x="715" y="383" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Pro</text>
    <text x="751" y="383" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Agency</text>

    <!-- Chart title -->
    <text x="722" y="295" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-weight="bold">COST COMPARISON</text>
  </g>

  <!-- ===== TITLE TEXT ===== -->
  <text x="430" y="175" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="-0.5" filter="url(#softGlow)">Small Business</text>
  <text x="430" y="225" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="-0.5" filter="url(#softGlow)">Website Cost</text>
  <text x="430" y="275" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">2026: The Honest Breakdown</text>
  <rect x="340" y="295" width="180" height="3" rx="2" fill="url(#gold)" />

  <!-- Floating coins -->
  <g filter="url(#glow)">
    <circle cx="160" cy="195" r="8" fill="#D4AF37" opacity="0.3" />
    <circle cx="700" cy="115" r="6" fill="#D4AF37" opacity="0.25" />
    <circle cx="200" cy="350" r="5" fill="#D4AF37" opacity="0.2" />
  </g>
</svg>