<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1a33;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#11294a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37" />
      <stop offset="100%" style="stop-color:#f0d060" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444" />
      <stop offset="100%" style="stop-color:#f87171" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981" />
      <stop offset="100%" style="stop-color:#34d399" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" fill="url(#bg)" />

  <!-- Decorative blobs -->
  <ellipse cx="720" cy="80" rx="120" ry="100" fill="rgba(212,175,55,0.04)" />
  <ellipse cx="140" cy="380" rx="100" ry="70" fill="rgba(239,68,68,0.04)" />
  <ellipse cx="430" cy="220" rx="300" ry="180" fill="rgba(212,175,55,0.02)" />

  <!-- ===== LARGE BROWSER WINDOW MOCKUP ===== -->
  <g filter="url(#shadow)">
    <!-- Monitor frame -->
    <rect x="200" y="70" width="460" height="290" rx="10" fill="#1e2a3e" />
    <!-- Screen -->
    <rect x="210" y="78" width="440" height="265" rx="4" fill="#0f1a2e" />

    <!-- Browser chrome -->
    <rect x="210" y="78" width="440" height="28" rx="4" fill="#1a2744" />
    <rect x="210" y="106" width="440" height="2" fill="rgba(255,255,255,0.06)" />
    <circle cx="224" cy="92" r="4" fill="rgba(239,68,68,0.6)" />
    <circle cx="236" cy="92" r="4" fill="rgba(251,191,36,0.6)" />
    <circle cx="248" cy="92" r="4" fill="rgba(16,185,129,0.6)" />

    <!-- URL bar -->
    <rect x="270" y="86" width="200" height="10" rx="5" fill="rgba(255,255,255,0.08)" />

    <!-- Website content on screen -->
    <!-- Header bar -->
    <rect x="220" y="118" width="420" height="24" rx="3" fill="rgba(255,255,255,0.06)" />
    <rect x="230" y="123" width="60" height="14" rx="2" fill="rgba(255,255,255,0.08)" />
    <rect x="300" y="123" width="40" height="14" rx="2" fill="rgba(255,255,255,0.05)" />
    <rect x="350" y="123" width="40" height="14" rx="2" fill="rgba(255,255,255,0.05)" />
    <rect x="400" y="123" width="50" height="14" rx="2" fill="rgba(255,255,255,0.05)" />

    <!-- Hero image area -->
    <rect x="220" y="150" width="420" height="100" rx="4" fill="rgba(59,130,246,0.08)" />
    <rect x="240" y="165" width="180" height="8" rx="2" fill="rgba(212,175,55,0.4)" />
    <rect x="240" y="180" width="280" height="6" rx="2" fill="rgba(255,255,255,0.15)" />
    <rect x="240" y="193" width="160" height="6" rx="2" fill="rgba(255,255,255,0.1)" />
    <!-- Booking button -->
    <rect x="240" y="210" width="80" height="22" rx="4" fill="url(#gold)" opacity="0.6"/>

    <!-- Content columns -->
    <rect x="220" y="260" width="130" height="60" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="230" y="268" width="40" height="6" rx="2" fill="rgba(255,255,255,0.1)" />
    <rect x="230" y="280" width="90" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="230" y="290" width="70" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="230" y="302" width="60" height="10" rx="3" fill="rgba(16,185,129,0.4)" />

    <rect x="365" y="260" width="130" height="60" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="375" y="268" width="40" height="6" rx="2" fill="rgba(255,255,255,0.1)" />
    <rect x="375" y="280" width="90" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="375" y="290" width="70" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="375" y="302" width="60" height="10" rx="3" fill="rgba(16,185,129,0.4)" />

    <rect x="510" y="260" width="130" height="60" rx="4" fill="rgba(255,255,255,0.04)" />
    <rect x="520" y="268" width="40" height="6" rx="2" fill="rgba(255,255,255,0.1)" />
    <rect x="520" y="280" width="90" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="520" y="290" width="70" height="5" rx="2" fill="rgba(255,255,255,0.06)" />
    <rect x="520" y="302" width="60" height="10" rx="3" fill="rgba(16,185,129,0.4)" />
  </g>

  <!-- ===== NEGATIVE ELEMENTS (left side) ===== -->
  <!-- Slow loading spinner -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="100" height="40" rx="8" fill="#0d1b3e" stroke="rgba(239,68,68,0.3)" stroke-width="1.5" />
    <text x="110" y="124" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">⏳ 5.8s LOAD TIME</text>
  </g>

  <!-- High bounce rate -->
  <g filter="url(#shadow)">
    <rect x="50" y="170" width="120" height="40" rx="8" fill="#0d1b3e" stroke="rgba(239,68,68,0.3)" stroke-width="1.5" />
    <text x="110" y="194" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">↩ 78% BOUNCE RATE</text>
  </g>

  <!-- OTA commission -->
  <g filter="url(#shadow)">
    <rect x="40" y="250" width="140" height="40" rx="8" fill="#0d1b3e" stroke="rgba(239,68,68,0.3)" stroke-width="1.5" />
    <text x="110" y="274" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">💰 15-25% OTA FEES</text>
  </g>

  <!-- ===== POSITIVE ELEMENTS (right side) ===== -->
  <!-- Fast load -->
  <g filter="url(#shadow)">
    <rect x="640" y="110" width="120" height="40" rx="8" fill="#0d1b3e" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" />
    <text x="700" y="134" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="bold">⚡ 0.9s LOAD TIME</text>
  </g>

  <!-- More bookings -->
  <g filter="url(#shadow)">
    <rect x="640" y="180" width="130" height="40" rx="8" fill="#0d1b3e" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" />
    <text x="705" y="204" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="bold">📈 +200% DIRECT BOOKINGS</text>
  </g>

  <!-- No commission -->
  <g filter="url(#shadow)">
    <rect x="650" y="250" width="120" height="40" rx="8" fill="#0d1b3e" stroke="rgba(16,185,129,0.3)" stroke-width="1.5" />
    <text x="710" y="274" font-family="Arial, sans-serif" font-size="11" fill="#34d399" text-anchor="middle" font-weight="bold">✓ 0% COMMISSION</text>
  </g>

  <!-- ===== TITLE TEXT ===== -->
  <text x="430" y="175" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="-0.5" filter="url(#glow)">Why Small Hotel Websites</text>
  <text x="430" y="215" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="-0.5" filter="url(#glow)">Are Losing Bookings</text>
  <rect x="340" y="295" width="180" height="3" rx="2" fill="url(#gold)" />
  <text x="430" y="340" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="2">SPEED · MOBILE · TRUST · SEO · BOOKING FLOW</text>
</svg>